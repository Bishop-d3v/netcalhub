{% extends 'base.html' %}
{% block title %}Wildcard Mask Calculator - NetCalcHub{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-gray-800 p-8 rounded-lg border border-gray-700 shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-white text-center">Wildcard Mask Calculator</h2>
    
    <div class="mb-6">
        <label class="block text-sm mb-2 font-medium">Enter Subnet Mask</label>
        <input id="subMaskInput" type="text" value="255.255.255.240" class="w-full bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white text-center font-mono text-lg outline-none focus:border-indigo-500">
    </div>

    <button onclick="calcWildcard()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition">Invert Mask</button>

    <div id="wildcardResult" class="mt-8 hidden text-center bg-gray-900 p-6 rounded border border-gray-700">
        <span class="block text-sm text-gray-400 uppercase tracking-wider mb-2">Cisco Wildcard Mask</span>
        <span id="wildcardOutput" class="text-3xl font-mono text-emerald-400 font-bold"></span>
    </div>
</div>

<script>
function calcWildcard() {
    const mask = document.getElementById('subMaskInput').value.trim();
    if(!/^(?:\d{1,3}\.){3}\d{1,3}$/.test(mask)){
        alert("Enter a valid subnet mask layout.");
        return;
    }
    const octets = mask.split('.').map(o => 255 - parseInt(o, 10));
    if(octets.some(o => isNaN(o) || o < 0 || o > 255)) {
        alert("Invalid mask configuration numbers.");
        return;
    }
    document.getElementById('wildcardOutput').innerText = octets.join('.');
    document.getElementById('wildcardResult').classList.remove('hidden');
}
</script>
{% endblock %}
